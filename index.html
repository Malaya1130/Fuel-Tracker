<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fuel Mileage Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin:10px; background:#f4f6f9; font-size:13px; }
.header { display:flex; justify-content:space-between; align-items:center; }
.avg-box { background:#007bff; color:white; padding:5px 10px; border-radius:5px; }
select { padding:5px; }

table { width:100%; border-collapse:collapse; background:white; }
th,td { border:1px solid #ddd; padding:5px; text-align:center; }
th { background:#007bff; color:white; }

button { margin:5px; padding:5px; border:none; color:white; border-radius:3px; }
.add{background:#28a745;} .calc{background:#007bff;}
.export{background:#17a2b8;} .import{background:#fd7e14;}
.report{background:#6f42c1;} .savebtn{background:#20c997;}

.gold { background:#ffd700; }
.silver { background:#c0c0c0; }
.bronze { background:#cd7f32; }
</style>
</head>
<body>

<div class="header">
<h3>Fuel Tracker</h3>
<div>
<select id="yearSelect" onchange="changeYear()"></select>
</div>
<div id="avgMileage" class="avg-box">Avg. Milage: 0.00 km/L</div>
</div>

<table id="fuelTable">
<thead>
<tr>
<th>S.No.</th><th>Date</th><th>OMR</th><th>Fuel</th><th>Amount</th><th>Dist</th><th>Milage</th><th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button class="add" onclick="addRow()">Add</button>
<button class="calc" onclick="calculate()">Calc</button>
<button class="savebtn" onclick="save()">Save</button>
<button class="export" onclick="exportCSV()">Export</button>
<button class="import" onclick="document.getElementById('fileInput').click()">Import Excel</button>
<button class="report" onclick="generateReport()">Report</button>

<input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">

<h3 id="average"></h3>
<canvas id="chart" height="100"></canvas>
<div id="report"></div>

<script>
let chart;
let currentYear = "2025-2026";

function getKey(){ return "fuel_"+currentYear; }

function getPreviousYear(year){
let y=year.split("-");
return (parseInt(y[0])-1)+"-"+y[0];
}

function initYearDropdown(){
let select=document.getElementById("yearSelect");
for(let y=2025;y<=2035;y++){
let opt=document.createElement("option");
opt.value=`${y}-${y+1}`;
opt.text=`${y}-${y+1}`;
if(opt.value===currentYear) opt.selected=true;
select.appendChild(opt);
}
}

function changeYear(){
currentYear=document.getElementById("yearSelect").value;
document.querySelector("tbody").innerHTML="";
load();
}

function save(){
let data=[];
document.querySelectorAll("tbody tr").forEach(r=>{
data.push({
d:r.cells[1].children[0].value,
o:r.cells[2].children[0].value,
f:r.cells[3].children[0].value,
a:r.cells[4].children[0].value
});});
localStorage.setItem(getKey(),JSON.stringify(data));
alert("Data Saved Successfully");
}

function load(){
let d=JSON.parse(localStorage.getItem(getKey())||"[]");

// if empty, preload last entry from previous year
if(d.length===0){
let prevData=JSON.parse(localStorage.getItem("fuel_"+getPreviousYear(currentYear))||"[]");
if(prevData.length>0){
let last=prevData[prevData.length-1];
addRow(last);
return;
}
}

d.forEach(x=>addRow(x));
calculate();
}

function handleFile(e){
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=function(evt){
const data=new Uint8Array(evt.target.result);
const workbook=XLSX.read(data,{type:'array'});
const sheet=workbook.Sheets[workbook.SheetNames[0]];
const json=XLSX.utils.sheet_to_json(sheet);

document.querySelector("tbody").innerHTML="";
localStorage.removeItem(getKey());

json.forEach(row=>{
let excelDate=row["Dates"];
let formattedDate="";
if(typeof excelDate==="number"){
let d=new Date((excelDate-25569)*86400*1000);
formattedDate=d.toISOString().split("T")[0];
}else{
formattedDate=excelDate;
}
addRow({
d:formattedDate,
o:row["OMR"],
f:row["Qunt. (L)"],
a:row["Amount"]
});
});
calculate();
};
reader.readAsArrayBuffer(file);
}

document.getElementById("fileInput").addEventListener("change",handleFile);

function addRow(x={}){
let r=document.querySelector("tbody").insertRow();
r.insertCell(0);
["d","o","f","a"].forEach((k,i)=>{
let c=r.insertCell(i+1);
let inp=document.createElement("input");
inp.type=i==0?"date":"number";
inp.value=x[k]||"";
inp.oninput=()=>{saveSilent();calculate();};
c.appendChild(inp);
});
r.insertCell(5).innerText="-";
r.insertCell(6).innerText="-";
let act=r.insertCell(7);
act.innerHTML="<button onclick='move(this,-1)'>↑</button><button onclick='move(this,1)'>↓</button><button onclick='del(this)'>X</button>";
updateSN(); saveSilent();
}

function saveSilent(){
let data=[];
document.querySelectorAll("tbody tr").forEach(r=>{
data.push({
d:r.cells[1].children[0].value,
o:r.cells[2].children[0].value,
f:r.cells[3].children[0].value,
a:r.cells[4].children[0].value
});});
localStorage.setItem(getKey(),JSON.stringify(data));
}

function move(btn,dir){
let r=btn.parentNode.parentNode;
let tb=r.parentNode;
let i=[...tb.children].indexOf(r);
if(dir==-1 && i>0) tb.insertBefore(r,tb.children[i-1]);
if(dir==1 && i<tb.children.length-1) tb.insertBefore(tb.children[i+1],r);
updateSN(); saveSilent(); calculate();
}

function del(btn){btn.parentNode.parentNode.remove(); updateSN(); saveSilent(); calculate();}
function updateSN(){document.querySelectorAll("tbody tr").forEach((r,i)=>r.cells[0].innerText=i+1);}

function calculate(){
let prev=null,td=0,tf=0,ms=0,mc=0;
let labels=[],data=[],rows=[];

document.querySelectorAll("tbody tr").forEach(r=>{
let omr=parseFloat(r.cells[2].children[0].value);
let fuel=parseFloat(r.cells[3].children[0].value);
if(prev!=null && !isNaN(omr)){
let dist=omr-prev;
r.cells[5].innerText=dist;
if(fuel>0){
let mil=dist/fuel;
r.cells[6].innerText=mil.toFixed(2);
ms+=mil; mc++; td+=dist; tf+=fuel;
labels.push(r.cells[1].children[0].value);
data.push(mil);
rows.push({value:mil,row:r});
}
}else{r.cells[5].innerText="-"; r.cells[6].innerText="-";}
prev=omr;
});

if(tf>0) document.getElementById("average").innerText="Avg Total: "+(td/tf).toFixed(2)+" km/L";
if(mc>0) document.getElementById("avgMileage").innerText="Avg. Milage: "+(ms/mc).toFixed(2)+" km/L";

rows.sort((a,b)=>b.value-a.value);
document.querySelectorAll("tbody tr").forEach(r=>r.cells[6].className="");
if(rows[0]) rows[0].row.cells[6].classList.add("gold");
if(rows[1]) rows[1].row.cells[6].classList.add("silver");
if(rows[2]) rows[2].row.cells[6].classList.add("bronze");

if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:labels,datasets:[
{label:"Mileage",data:data},
{label:"Target 18",data:labels.map(()=>18),borderDash:[5,5]}
]}
});
}

function generateReport(){
let monthly={}, yearly={};
document.querySelectorAll("tbody tr").forEach(r=>{
let date=r.cells[1].children[0].value;
let mil=parseFloat(r.cells[6].innerText);
if(date && !isNaN(mil)){
let d=new Date(date);
let m=d.getFullYear()+"-"+(d.getMonth()+1);
let y=d.getFullYear();
(monthly[m]=monthly[m]||[]).push(mil);
(yearly[y]=yearly[y]||[]).push(mil);
}
});
let html="<h4>Monthly Avg</h4>";
for(let k in monthly){
let avg=(monthly[k].reduce((a,b)=>a+b)/monthly[k].length).toFixed(2);
html+=k+": "+avg+" km/L<br>";
}
html+="<h4>Yearly Avg</h4>";
for(let k in yearly){
let avg=(yearly[k].reduce((a,b)=>a+b)/yearly[k].length).toFixed(2);
html+=k+": "+avg+" km/L<br>";
}
document.getElementById("report").innerHTML=html;
}

function exportCSV(){
let csv="S.No,Date,OMR,Fuel,Amount,Dist,Mileage\n";
document.querySelectorAll("tbody tr").forEach((r,i)=>{
csv+=`${i+1},${r.cells[1].children[0].value},${r.cells[2].children[0].value},${r.cells[3].children[0].value},${r.cells[4].children[0].value},${r.cells[5].innerText},${r.cells[6].innerText}\n`;
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="fuel.csv";
a.click();
}

initYearDropdown();
load();
if(document.querySelectorAll("tbody tr").length==0) addRow();
</script>

</body>
</html>
